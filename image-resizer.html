<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Image Resizer — Resize Images to Any Size Online | FreeToolHub</title>

<style>
body{background:#050508;color:#fff;font-family:sans-serif;text-align:center;padding:40px}
.card{background:#111;padding:20px;border-radius:12px;max-width:500px;margin:auto}
input{padding:10px;margin:10px;width:120px}
button{padding:10px 20px;background:#a78bfa;border:none;color:#000;font-weight:bold;border-radius:8px;cursor:pointer}
img{max-width:100%;margin-top:10px}
</style>
</head>

<body>

<div class="card">
<h2>Image Resizer</h2>

<input type="file" id="fi" accept="image/*"><br>

<input type="number" id="nw" placeholder="Width">
<input type="number" id="nh" placeholder="Height"><br>

<button onclick="resizeImage()">Resize & Download</button>

<img id="preview">
<canvas id="cv" style="display:none;"></canvas>
</div>

<script>
let imgO = new Image();

document.getElementById('fi').onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ev => {
    imgO.src = ev.target.result;
    document.getElementById('preview').src = ev.target.result;
  };

  reader.readAsDataURL(file);
};

function resizeImage(){
  const w = +document.getElementById('nw').value;
  const h = +document.getElementById('nh').value;

  if(!w || !h){
    alert('Enter width and height');
    return;
  }

  const canvas = document.getElementById('cv');
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(imgO, 0, 0, w, h);

  const a = document.createElement('a');
  a.download = 'resized.png';
  a.href = canvas.toDataURL();
  a.click();
}
</script>

</body>
</html>
