<!-- ============================================
  COOKIE BANNER — paste this just before </body>
  on EVERY page (index, all tools, about, contact, privacy)
  ============================================ -->
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9000;background:#0e0e14;border-top:1px solid rgba(167,139,250,.2);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;backdrop-filter:blur(12px);">
  <div style="font-size:.82rem;color:#6b6880;max-width:600px;">
    &#x1F36A; We use cookies for Google Analytics to understand how visitors use our site. No personal data is collected or stored. <a href="/privacy.html" style="color:#a78bfa;text-decoration:underline;">Privacy Policy</a>
  </div>
  <div style="display:flex;gap:.65rem;flex-shrink:0;">
    <button onclick="acceptCookies()" style="background:linear-gradient(135deg,#a78bfa,#38bdf8);color:#050508;border:none;border-radius:8px;padding:.5rem 1.2rem;font-weight:700;font-size:.82rem;cursor:pointer;">Accept</button>
    <button onclick="declineCookies()" style="background:transparent;color:#6b6880;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:.5rem 1rem;font-size:.82rem;cursor:pointer;">Decline</button>
  </div>
</div>
<script>
(function(){
  var banner = document.getElementById('cookieBanner');
  var consent = localStorage.getItem('cookieConsent');
  if (!consent) { banner.style.display = 'flex'; }
})();
function acceptCookies() {
  localStorage.setItem('cookieConsent', 'accepted');
  document.getElementById('cookieBanner').style.display = 'none';
}
function declineCookies() {
  localStorage.setItem('cookieConsent', 'declined');
  document.getElementById('cookieBanner').style.display = 'none';
}
</script>
